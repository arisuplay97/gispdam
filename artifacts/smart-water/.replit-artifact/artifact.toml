kind = "web"
previewPath = "/"
title = "Smart Water System"
version = "1.0.0"
id = "artifacts/smart-water"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20092

[services.development]
run = "pnpm --filter @workspace/smart-water run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-water", "run", "build" ]
publicDir = "artifacts/smart-water/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20092"
BASE_PATH = "/"
